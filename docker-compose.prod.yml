version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        COMPOSER_NO_DEV: "true"
    container_name: rnreport_app_prod
    env_file:
      - .env
    environment:
      - CI_ENVIRONMENT=production
      - CI_DEBUG=false
    volumes:
      - appcode:/var/www/html
    expose:
      - "9000"
    restart: unless-stopped
    networks:
      - rnreport_net

  web:
    image: nginx:stable-alpine
    container_name: rnreport_web_prod
    depends_on:
      - app
    ports:
      - "8080:80"
    env_file:
      - .env
    volumes:
      - appcode:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - rnreport_net

volumes:
  appcode:

networks:
  rnreport_net:
    driver: bridge
