version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rnreport_app
    env_file:
      - .env
    volumes:
      - ./:/var/www/html:cached
    ports:
      - "9000:9000"
    networks:
      - rnreport_net

  web:
    image: nginx:stable-alpine
    container_name: rnreport_web
    depends_on:
      - app
    ports:
      - "8080:80"
    env_file:
      - .env
    volumes:
      - ./:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - rnreport_net

networks:
  rnreport_net:
    driver: bridge
